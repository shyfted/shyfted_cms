<!DOCTYPE html>
<html>
<head>
    <title>Shyfted CMS Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex min-h-screen items-center justify-center bg-[#10131a] px-4 text-[#d7deea]">

<form method="POST" class="w-full max-w-sm rounded-lg border border-[#2a3344] bg-[#171c26] p-6 shadow-2xl">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <h1 class="mb-1 text-2xl font-semibold text-[#f4f7fb]">Shyfted CMS</h1>
    <p class="mb-5 text-sm text-[#94a3b8]">Sign in to manage display content.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div class="mb-3 rounded border border-[#2e6a4f] bg-[#143426] p-2 text-sm text-[#bdebd0]">{{ message }}</div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    {% if error %}
    <div class="mb-3 rounded border border-[#7a3441] bg-[#3a1b22] p-2 text-sm text-[#ffc4cc]">
        {{ error }}
    </div>
    {% endif %}

    <label class="mb-1 block text-sm font-semibold text-[#dbe4f3]" for="email">Email</label>
    <input id="email" name="email" type="email" autocomplete="username" required class="mb-3 w-full rounded border border-[#2a3344] bg-[#111722] p-2 text-[#eef3fb]">

    <label class="mb-1 block text-sm font-semibold text-[#dbe4f3]" for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required class="mb-4 w-full rounded border border-[#2a3344] bg-[#111722] p-2 text-[#eef3fb]">

    <button class="w-full rounded bg-[#f7d99d] p-2 font-bold text-[#3f2f13]">Login</button>
    <a class="mt-4 block text-center text-sm text-[#c7ddff]" href="{{ url_for('forgot_password') }}">Forgot password?</a>
</form>

</body>
</html>
