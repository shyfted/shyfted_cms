<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password - Shyfted CMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex min-h-screen items-center justify-center bg-[#10131a] px-4 text-[#d7deea]">

<form method="POST" class="w-full max-w-sm rounded-lg border border-[#2a3344] bg-[#171c26] p-6 shadow-2xl">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <h1 class="mb-1 text-2xl font-semibold text-[#f4f7fb]">Reset access</h1>
    <p class="mb-5 text-sm text-[#94a3b8]">Enter your CMS email address.</p>

    {% if sent %}
    <div class="mb-3 rounded border border-[#2e6a4f] bg-[#143426] p-2 text-sm text-[#bdebd0]">
        If that account exists, a reset link has been sent.
    </div>
    {% endif %}

    {% if error %}
    <div class="mb-3 rounded border border-[#7a3441] bg-[#3a1b22] p-2 text-sm text-[#ffc4cc]">{{ error }}</div>
    {% endif %}

    <label class="mb-1 block text-sm font-semibold text-[#dbe4f3]" for="email">Email</label>
    <input id="email" name="email" type="email" autocomplete="username" required class="mb-4 w-full rounded border border-[#2a3344] bg-[#111722] p-2 text-[#eef3fb]">

    <button class="w-full rounded bg-[#f7d99d] p-2 font-bold text-[#3f2f13]">Send reset link</button>
    <a class="mt-4 block text-center text-sm text-[#c7ddff]" href="{{ url_for('login') }}">Back to login</a>
</form>

</body>
</html>
