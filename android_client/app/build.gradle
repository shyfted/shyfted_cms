plugins {
    id "com.android.application"
}

android {
    namespace "au.com.shyfted.client"
    compileSdk 35

    defaultConfig {
        applicationId "au.com.shyfted.client"
        minSdk 23
        targetSdk 30
        versionCode 1
        versionName "0.1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    buildFeatures {
        aidl true
    }
}
