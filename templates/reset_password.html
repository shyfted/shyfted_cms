<!DOCTYPE html>
<html>
<head>
    <title>Reset Password - Shyfted CMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex min-h-screen items-center justify-center bg-[#10131a] px-4 text-[#d7deea]">

<div class="w-full max-w-sm rounded-lg border border-[#2a3344] bg-[#171c26] p-6 shadow-2xl">
    <h1 class="mb-1 text-2xl font-semibold text-[#f4f7fb]">Set new password</h1>

    {% if invalid %}
    <div class="mt-5 rounded border border-[#7a3441] bg-[#3a1b22] p-2 text-sm text-[#ffc4cc]">
        This reset link is invalid or has expired.
    </div>
    <a class="mt-4 block text-center text-sm text-[#c7ddff]" href="{{ url_for('forgot_password') }}">Request a new link</a>
    {% else %}
    <p class="mb-5 text-sm text-[#94a3b8]">Use at least 10 characters.</p>

    {% if error %}
    <div class="mb-3 rounded border border-[#7a3441] bg-[#3a1b22] p-2 text-sm text-[#ffc4cc]">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label class="mb-1 block text-sm font-semibold text-[#dbe4f3]" for="password">New password</label>
        <input id="password" name="password" type="password" autocomplete="new-password" required minlength="10" class="mb-3 w-full rounded border border-[#2a3344] bg-[#111722] p-2 text-[#eef3fb]">

        <label class="mb-1 block text-sm font-semibold text-[#dbe4f3]" for="confirm_password">Confirm password</label>
        <input id="confirm_password" name="confirm_password" type="password" autocomplete="new-password" required minlength="10" class="mb-4 w-full rounded border border-[#2a3344] bg-[#111722] p-2 text-[#eef3fb]">

        <button class="w-full rounded bg-[#f7d99d] p-2 font-bold text-[#3f2f13]">Update password</button>
    </form>
    {% endif %}
</div>

</body>
</html>
