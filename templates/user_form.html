<!DOCTYPE html>
<html>
<head>
<title>Create User - Shyfted CMS</title>
<style>
body { background:#10131a; color:#d7deea; font-family:"Space Grotesk","Avenir Next","Segoe UI",system-ui,sans-serif; padding:20px; }
.panel { background:#171c26; border:1px solid #2a3344; border-radius:8px; max-width:520px; padding:18px; }
h1 { color:#f4f7fb; font-size:24px; margin:0 0 16px; }
label { color:#dbe4f3; display:block; font-size:13px; font-weight:700; margin:12px 0 5px; }
input, select { background:#111722; border:1px solid #2a3344; border-radius:8px; color:#eef3fb; box-sizing:border-box; padding:10px; width:100%; }
.actions { display:flex; gap:10px; margin-top:16px; }
button, .button { border:0; border-radius:8px; cursor:pointer; display:inline-block; font-weight:700; padding:10px 14px; text-decoration:none; }
button { background:#f7d99d; color:#3f2f13; }
.button { background:#30384a; color:#dbe4f3; }
.message { background:#3a1b22; border:1px solid #7a3441; border-radius:8px; color:#ffc4cc; margin-bottom:14px; padding:10px 12px; }
</style>
</head>
<body>
<main class="panel">
<h1>Create user</h1>
{% if error %}<div class="message">{{ error }}</div>{% endif %}
<form method="POST">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
<label for="name">Name</label>
<input id="name" name="name" value="{{ values.name }}" required>
<label for="email">Email</label>
<input id="email" name="email" type="email" value="{{ values.email }}" required>
<label for="role">Role</label>
<select id="role" name="role">
<option value="staff" {% if values.role == "staff" %}selected{% endif %}>Store/staff user</option>
<option value="admin" {% if values.role == "admin" %}selected{% endif %}>Admin</option>
</select>
<label for="password">Temporary password</label>
<input id="password" name="password" type="password" autocomplete="new-password" minlength="10" required>
<label for="confirm_password">Confirm password</label>
<input id="confirm_password" name="confirm_password" type="password" autocomplete="new-password" minlength="10" required>
<div class="actions">
<button>Create user</button>
<a class="button" href="{{ url_for('users') }}">Cancel</a>
</div>
</form>
</main>
</body>
</html>
